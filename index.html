      const [validationError, setValidationError] = useState(null); 

      useEffect(() => {
        signInAnonymously(auth).catch(error => console.error(error));
        return onAuthStateChanged(auth, setUser);
      }, []);

      useEffect(() => {
        if (!user) return;
        const ordersRef = collection(db, 'orders');
        const unsubOrders = onSnapshot(ordersRef, (snap) => {
          const allOrders = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          allOrders.sort((a, b) => b.timestamp - a.timestamp);
          setOrders(allOrders);
        });
        return () => unsubOrders();
      }, [user]);

      const showNotify = (msg, type = 'success') => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const askConfirm = (title, message, onConfirm) => setConfirmDialog({ title, message, onConfirm });
      const closeConfirm = () => setConfirmDialog(null);

      const switchView = (targetView) => {
        setView(targetView);
        if (targetView === 'aggregate') setAggChecklist({});
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (!loginName.trim()) return;
        if (loginName === ADMIN_USER) {
          if (loginPass === ADMIN_PASS) {
            setAppUser({ name: '管理員', isAdmin: true });
            switchView('admin');
          } else { showNotify('密碼錯誤', 'error'); }
        } else {
          setAppUser({ name: loginName, isAdmin: false });
          switchView('order');
        }
      };

      const openOrderModal = (item, size, price) => {
        setPendingOrder({ item, size, price: Number(price) });
        setValidationError(null);
        
        const name = item.name;
        const isFixedSugar = name.includes('甜度固定');
        const isFixedIce = name.includes('冰度固定');
        
        setSugarLocked(isFixedSugar);
        setIceLocked(isFixedIce);

        let initSugar = currentStore.sugar[0]; 
        if (isFixedSugar) initSugar = '甜度固定';

        let initIce = currentStore.ice[0]; 
        if (name.includes('固定少冰')) initIce = '少冰';
        else if (name.includes('固定去冰')) initIce = '去冰(0%)';

        setOrderConfig({ sugar: isFixedSugar ? initSugar : '', ice: isFixedIce ? initIce : '', toppings: [] }); 
        setModalOpen(true);
      };

      const toggleTopping = (toppingObj) => {
        setOrderConfig(prev => {
          const exists = prev.toppings.find(t => t.name === toppingObj.name);
          if (exists) return { ...prev, toppings: prev.toppings.filter(t => t.name !== toppingObj.name) };
          return { ...prev, toppings: [...prev.toppings, toppingObj] };
        });
      };

      const calculateCurrentTotal = () => {
        if (!pendingOrder) return 0;
        const base = Number(pendingOrder.price) || 0;
        const toppings = orderConfig.toppings.reduce((sum, t) => sum + Number(t.price || 0), 0);
        return base + toppings;
      };

      const confirmOrder = async () => {
        if (!appUser || !user || !pendingOrder) return;
        if (!orderConfig.sugar && !sugarLocked) { showNotify('請選擇甜度！', 'error'); setValidationError('sugar'); return; }
        if (!orderConfig.ice && !iceLocked) { showNotify('請選擇冰塊！', 'error'); setValidationError('ice'); return; }

        setLoading(true);
        const finalPrice = calculateCurrentTotal();
        const toppingNames = orderConfig.toppings.map(t => t.name);

        try {
          await addDoc(collection(db, 'orders'), {
            userName: appUser.name, storeKey: activeStoreKey, storeName: currentStore.name,
            itemName: pendingOrder.item.name, size: pendingOrder.size, price: finalPrice,
            sugar: String(orderConfig.sugar), ice: String(orderConfig.ice),
            toppings: toppingNames, timestamp: Date.now(), userId: user.uid, isPickedUp: false
          });
          showNotify(`已點購：${pendingOrder.item.name}`);
          setModalOpen(false); setPendingOrder(null);
        } catch (e) { showNotify('點餐失敗', 'error'); }
        setLoading(false);
      };

      const handleDeleteOrder = (orderId) => {
        askConfirm('刪除訂單', '確定要刪除這筆訂單嗎？', async () => {
          try { await deleteDoc(doc(db, 'orders', orderId)); showNotify('訂單已刪除'); } 
          catch { showNotify('刪除失敗', 'error'); } closeConfirm();
        });
      };

      const handleClearMyOrders = () => {
        if (!appUser) return;
        const myOrders = orders.filter(o => o.userName === appUser.name);
        if (myOrders.length === 0) return;
        askConfirm('重新選擇', `確定要刪除您 (${appUser.name}) 目前的所有訂單嗎？`, async () => {
          setLoading(true);
          const batch = writeBatch(db);
          myOrders.forEach(o => batch.delete(doc(db, 'orders', o.id)));
          await batch.commit();
          showNotify('已清除舊訂單'); setLoading(false); closeConfirm();
        });
      };

      const handleTogglePickup = async (order) => {
        try { await updateDoc(doc(db, 'orders', order.id), { isPickedUp: !order.isPickedUp }); } 
        catch (e) { console.error("Toggle pickup error", e); }
      };

      const handleDeleteTodayOrders = () => {
        askConfirm('危險操作', '確定要清空今日所有訂單？', async () => {
          setLoading(true);
          const today = new Date(); today.setHours(0,0,0,0);
          const batch = writeBatch(db);
          let c = 0;
          orders.forEach(o => { if (o.timestamp >= today.getTime()) { batch.delete(doc(db, 'orders', o.id)); c++; } });
          if (c > 0) { await batch.commit(); showNotify(`已刪除 ${c} 筆`); } else { showNotify('無今日訂單', 'info'); }
          setLoading(false); closeConfirm();
        });
      };

      const handleClearCurrentData = () => {
        askConfirm('清空所有訂單', '確定要清空「所有」的歷史訂單嗎？', async () => {
          setLoading(true);
          const batch = writeBatch(db);
          orders.forEach(o => batch.delete(doc(db, 'orders', o.id)));
          try { await batch.commit(); showNotify('訂單已清空'); } 
          catch (e) { showNotify('清空失敗', 'error'); }
          setLoading(false); closeConfirm();
        });
      };

      const totalAmount = orders.reduce((sum, c) => sum + c.price, 0);

      const getAggregatedOrders = (targetStoreKey) => {
        const grouped = {};
        const storeOrders = orders.filter(o => o.storeKey === targetStoreKey);
        storeOrders.forEach(order => {
          const toppingsStr = order.toppings && order.toppings.length > 0 ? order.toppings.sort().join(',') : '';
          const key = `${order.itemName}|${order.size}|${order.sugar}|${order.ice}|${toppingsStr}`;
          if (!grouped[key]) grouped[key] = { id: key, name: order.itemName, size: order.size, sugar: order.sugar, ice: order.ice, toppings: toppingsStr, count: 0, users: [], price: order.price };
          grouped[key].count += 1; grouped[key].users.push(order.userName);
        });
        return Object.values(grouped).sort((a, b) => a.name.localeCompare(b.name));
      };

      const getPickupOrders = () => [...orders].sort((a, b) => a.userName.localeCompare(b.userName, 'zh-Hant'));

      const themeFromStoreKey = (key) => {
        switch(key) {
          case 'DEZHENG': return 'bg-sky-100 text-sky-900 border-sky-200';
          case 'GUIJI': return 'bg-green-100 text-green-900 border-green-200';
          case 'MILKSHA': return 'bg-teal-100 text-teal-900 border-teal-200';
          case 'MACU': return 'bg-rose-100 text-rose-900 border-rose-200';
          default: return 'bg-orange-100 text-orange-900 border-orange-200';
        }
      };

      if (!user) return <div className="min-h-screen flex items-center justify-center text-stone-500 font-bold">連線中... 🍡</div>;

      return (
        <div className="pb-20 relative">
          <nav className="sticky top-4 z-50 px-4">
            <div className="max-w-4xl mx-auto bg-white/90 backdrop-blur-md shadow-sm border-2 border-stone-100 rounded-full px-5 py-3 flex justify-between items-center transition-all">
              <div className="flex items-center space-x-2">
                <div className="bg-orange-100 p-2 rounded-full"><Coffee className="text-orange-500" size={20} /></div>
                <div className="hidden sm:block"><h1 className="text-base font-extrabold text-stone-800 tracking-tight">789說喝就喝 🌸</h1></div>
              </div>
              {appUser && (
                <div className="flex items-center space-x-1 sm:space-x-2 overflow-x-auto no-scrollbar">
                  <button onClick={() => switchView('order')} className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold transition-all ${view === 'order' ? 'bg-orange-400 text-white shadow-sm' : 'text-stone-500 hover:bg-stone-100'}`}><ShoppingBag size={16} /> 點餐</button>
                  <button onClick={() => switchView('pickup')} className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold transition-all ${view === 'pickup' ? 'bg-sky-400 text-white shadow-sm' : 'text-stone-500 hover:bg-stone-100'}`}><HandPlatter size={16} /> 領取</button>
                  <button onClick={() => switchView('summary')} className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold transition-all ${view === 'summary' ? 'bg-amber-400 text-white shadow-sm' : 'text-stone-500 hover:bg-stone-100'}`}><Users size={16} /> 統計</button>
                  <button onClick={() => switchView('aggregate')} className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold transition-all ${view === 'aggregate' ? 'bg-emerald-400 text-white shadow-sm' : 'text-stone-500 hover:bg-stone-100'}`}><ClipboardList size={16} /> 彙整</button>
                  {appUser.isAdmin && <button onClick={() => switchView('admin')} className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold transition-all ${view === 'admin' ? 'bg-rose-400 text-white shadow-sm' : 'text-stone-500 hover:bg-stone-100'}`}><AlertTriangle size={16} /> 後台</button>}
                  <div className="w-px h-5 bg-stone-200 mx-1"></div>
                  <button onClick={() => { setAppUser(null); switchView('login'); }} className="flex items-center justify-center w-8 h-8 rounded-full text-stone-400 hover:bg-rose-100 hover:text-rose-500 transition-colors"><LogOut size={16} /></button>
                </div>
              )}
            </div>
          </nav>

          <div className="max-w-4xl mx-auto px-4 py-8">
            {!appUser && (
              <div className="min-h-[75vh] flex flex-col justify-center items-center relative overflow-hidden">
                <div className="absolute top-0 left-0 w-72 h-72 bg-amber-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
                <div className="absolute top-10 right-0 w-72 h-72 bg-rose-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
                <div className="absolute -bottom-10 left-20 w-72 h-72 bg-sky-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-4000"></div>
                <div className="bg-white/80 backdrop-blur-xl p-8 rounded-[2.5rem] border-2 border-white shadow-xl w-full max-w-md relative z-10">
                  <div className="text-center mb-8">
                    <div className="bg-orange-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-orange-500 transform -rotate-6"><Coffee size={36} /></div>
                    <h2 className="text-3xl font-extrabold text-stone-800 tracking-tight mb-2">789說喝就喝 🍡</h2>
                    <p className="text-stone-500 font-medium text-sm">揪團喝飲料，輕鬆點餐無負擔</p>
                  </div>
                  <div className="bg-sky-50 border-2 border-sky-100 rounded-2xl p-4 mb-6 flex items-start gap-3"><Info className="text-sky-500 shrink-0 mt-0.5" size={18} /><p className="text-xs text-sky-700 leading-relaxed text-left">若要修改或查看訂單，請登入後點選上方的 <strong>「統計」</strong> 圖示，即可查看或刪除訂單喔！</p></div>
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div><input type="text" value={loginName} onChange={(e) => setLoginName(e.target.value)} placeholder="請輸入您的名字 (Name)" className="w-full px-5 py-4 bg-stone-50 border-2 border-stone-100 rounded-full focus:ring-4 focus:ring-orange-100 focus:border-orange-300 outline-none transition-all font-bold text-stone-700 text-center" required /></div>
                    {loginName === ADMIN_USER && (<div className="animate-fade-in"><input type="password" value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="管理員密碼" className="w-full px-5 py-4 bg-stone-50 border-2 border-stone-100 rounded-full focus:ring-4 focus:ring-rose-100 focus:border-rose-300 outline-none transition-all font-bold text-center" /></div>)}
                    <button type="submit" className="w-full bg-stone-800 hover:bg-stone-700 text-white font-extrabold py-4 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">開始點餐 <Check size={18} /></button>
                  </form>
                </div>
              </div>
            )}

            {appUser && view === 'order' && (
              <div className="space-y-8 animate-fade-in">
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 bg-stone-200/50 p-2 rounded-[2rem]">
                  {Object.values(STORES).map(store => {
                    const isActive = activeStoreKey === store.key;
                    let activeStyle = 'bg-white shadow-sm';
                    if (isActive) {
                      if (store.key === 'DEZHENG') activeStyle += ' text-sky-600 border-sky-200';
                      else if (store.key === 'GUIJI') activeStyle += ' text-green-600 border-green-200';
                      else if (store.key === 'MILKSHA') activeStyle += ' text-teal-600 border-teal-200';
                      else if (store.key === 'MACU') activeStyle += ' text-rose-600 border-rose-200';
                    }
                    return (
                      <button key={store.key} onClick={() => setActiveStoreKey(store.key)} className={`py-3 text-sm font-extrabold rounded-[1.5rem] transition-all duration-300 border-2 ${isActive ? activeStyle : 'border-transparent text-stone-500 hover:text-stone-700 hover:bg-stone-200/50'}`}>{store.name.split(' ')[0]}</button>
                    );
                  })}
                </div>
                <div className={`rounded-[2rem] p-8 border-2 shadow-sm relative overflow-hidden transition-colors duration-500 ${themeFromStoreKey(activeStoreKey)}`}>
                  <div className="absolute -top-4 -right-4 p-8 opacity-10 transform rotate-12"><Store size={180} /></div>
                  <div className="relative z-10"><div className="inline-flex items-center gap-2 bg-white/50 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-extrabold uppercase tracking-widest mb-4"><Store size={12} /> 選擇的店家</div><h2 className="text-3xl font-extrabold mb-3 tracking-tight">{currentStore.name}</h2><div className="flex items-center gap-4 text-sm font-bold opacity-80 flex-wrap"><span className="flex items-center gap-1.5"><Phone size={16} /> {currentStore.phone}</span><span className="flex items-center gap-1.5"><MapPin size={16} /> {currentStore.address}</span></div></div>
                </div>
                {orders.some(o => o.userName === appUser.name) && (
                  <div className="p-4 bg-orange-50 border-2 border-orange-100 rounded-[2rem] flex justify-between items-center"><div className="flex items-center gap-3 text-orange-700"><Check className="bg-orange-400 text-white rounded-full p-1" size={24} /><span className="font-bold">您已經點過餐囉！</span></div><button onClick={handleClearMyOrders} className="flex items-center gap-1.5 bg-white border-2 border-orange-100 text-orange-600 px-4 py-2 rounded-full text-xs font-bold hover:bg-orange-100 transition shadow-sm active:scale-95"><RefreshCw size={14} /> 重選</button></div>
                )}
                <div>
                  <div className="flex justify-between items-end mb-4 px-2"><h3 className="font-extrabold text-stone-800 text-xl flex items-center gap-2"><Coffee className="text-stone-400" size={22} /> 飲品目錄</h3><span className="text-sm font-bold text-stone-400 bg-stone-100 px-3 py-1 rounded-full">{currentStore.items.length} 品項</span></div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {currentStore.items.map((item, idx) => (
                      <div key={idx} className="bg-white p-5 rounded-[2rem] border-2 border-stone-100 shadow-sm flex justify-between items-center hover:shadow-md hover:border-orange-200 hover:-translate-y-1 transition-all group"><div className="pr-4"><h3 className="font-bold text-stone-700 group-hover:text-orange-600 transition-colors text-lg leading-tight">{item.name}</h3></div><div className="flex gap-2 flex-wrap justify-end">{Object.entries(item.prices).map(([size, price], pIdx) => (<button key={pIdx} onClick={() => openOrderModal(item, size, price)} disabled={loading} className="flex flex-col items-center justify-center min-w-[54px] bg-stone-50 border-2 border-transparent hover:border-orange-200 hover:bg-orange-50 rounded-2xl px-2 py-1.5 transition-all active:scale-95"><span className="text-[10px] text-stone-400 font-extrabold mb-0.5">{size}</span><span className="text-base font-extrabold text-stone-800">${price}</span></button>))}</div></div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {appUser && view === 'pickup' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-sky-100 border-2 border-sky-200 text-sky-900 p-6 rounded-[2rem] relative overflow-hidden flex items-center justify-between"><div className="relative z-10"><div className="text-sky-600 text-sm font-extrabold uppercase mb-1">今日訂單總數</div><div className="text-4xl font-extrabold">{orders.length} <span className="text-lg font-bold opacity-60">杯</span></div><div className="text-xs font-bold text-sky-500 mt-2 bg-white/50 inline-block px-3 py-1 rounded-full">💡 點擊卡片即可標記為「已領取」</div></div><HandPlatter className="text-sky-300 opacity-50 transform -rotate-12" size={100} /></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  {getPickupOrders().length === 0 ? <div className="col-span-full p-10 text-center font-bold text-stone-400 bg-white border-2 border-dashed border-stone-200 rounded-[2rem]">尚無任何人點餐 🍃</div> : getPickupOrders().map((order) => (
                    <div key={order.id} onClick={() => handleTogglePickup(order)} className={`p-5 rounded-[2rem] border-2 cursor-pointer transition-all duration-300 relative overflow-hidden group ${order.isPickedUp ? 'bg-stone-100 border-stone-200 opacity-60 scale-[0.98]' : 'bg-white border-stone-100 shadow-sm hover:shadow-md hover:border-sky-300'}`}>{order.isPickedUp && <div className="absolute inset-0 flex items-center justify-center z-10 pointer-events-none"><div className="bg-stone-800 text-white font-black px-4 py-2 rounded-full rotate-[-15deg] shadow-lg">已領取 ✨</div></div>}<div className="flex justify-between items-start mb-3"><h3 className={`font-extrabold text-xl ${order.isPickedUp ? 'text-stone-400 line-through' : 'text-stone-800'}`}>{order.userName}</h3><div className="flex flex-col items-end gap-1.5"><span className="text-[10px] px-2.5 py-1 rounded-full font-bold bg-stone-100 text-stone-500">{order.storeName.split(' ')[0]}</span><span className={`text-sm px-3 py-1 rounded-full font-black ${order.isPickedUp ? 'bg-stone-200 text-stone-400' : 'bg-sky-100 text-sky-700'}`}>${order.price}</span></div></div><div className={`space-y-1.5 ${order.isPickedUp ? 'opacity-50 line-through' : ''}`}><div className="font-bold text-stone-700 text-lg">{order.itemName} <span className="text-xs bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full align-middle">{order.size}</span></div><div className="text-sm font-bold text-stone-400 flex gap-2"><span>{order.sugar}</span><span>/</span><span>{order.ice}</span></div>{order.toppings && order.toppings.length > 0 && <div className="text-xs text-orange-500 font-extrabold mt-2 inline-block bg-orange-50 px-2 py-1 rounded-full">+ {order.toppings.join(', ')}</div>}</div></div>
                  ))}
                </div>
              </div>
            )}

            {appUser && view === 'summary' && (
              <div className="space-y-6 animate-fade-in">
                <div className="grid grid-cols-2 gap-4"><div className="bg-amber-100 border-2 border-amber-200 text-amber-900 p-6 rounded-[2rem] relative overflow-hidden"><div className="relative z-10"><div className="text-amber-600 text-sm font-extrabold uppercase mb-1">總杯數</div><div className="text-4xl font-extrabold">{orders.length}</div></div><Coffee className="absolute -bottom-2 -right-2 text-amber-300 opacity-50" size={80} /></div><div className="bg-emerald-100 border-2 border-emerald-200 text-emerald-900 p-6 rounded-[2rem] relative overflow-hidden"><div className="relative z-10"><div className="text-emerald-600 text-sm font-extrabold uppercase mb-1">總金額</div><div className="text-4xl font-extrabold tracking-tight">${totalAmount}</div></div><DollarSign className="absolute -bottom-2 -right-2 text-emerald-300 opacity-50" size={80} /></div></div>
                <div className="bg-white rounded-[2rem] shadow-sm border-2 border-stone-100 overflow-hidden"><div className="p-5 border-b-2 border-stone-50 bg-stone-50/50 flex justify-between items-center"><h3 className="font-extrabold text-stone-700 text-lg">詳細訂單</h3><span className="text-xs bg-white border-2 border-stone-100 px-3 py-1 rounded-full font-bold text-stone-500">依時間排序</span></div><div className="max-h-[500px] overflow-y-auto p-0 no-scrollbar">{orders.length === 0 ? <div className="p-10 text-center text-stone-400 font-bold">空空如也 💨</div> : (<table className="w-full text-sm text-left"><thead className="text-stone-400 bg-white sticky top-0 text-xs uppercase font-extrabold border-b-2 border-stone-100"><tr><th className="px-5 py-4">訂購人</th><th className="px-5 py-4">內容</th><th className="px-5 py-4 text-right">金額</th><th className="px-5 py-4"></th></tr></thead><tbody className="divide-y-2 divide-stone-50">{orders.map((order) => (<tr key={order.id} className="hover:bg-stone-50 transition-colors"><td className="px-5 py-4 align-middle"><div className="font-extrabold text-stone-700 text-base">{order.userName}</div><div className="text-[10px] px-2 py-0.5 rounded-full inline-block mt-1 bg-stone-100 text-stone-500 font-bold">{order.storeName.split(' ')[0]}</div></td><td className="px-5 py-4 align-middle"><div className="flex items-center gap-2 mb-1"><span className="text-stone-800 font-extrabold text-base">{order.itemName}</span><span className="text-[10px] font-bold bg-stone-100 px-2 py-0.5 rounded-full text-stone-500">{order.size}</span></div><div className="text-xs font-bold text-stone-400">{String(order.sugar)} / {String(order.ice)}</div>{order.toppings?.length > 0 && <div className="text-xs font-bold text-orange-500 mt-1.5">+ {order.toppings.join(', ')}</div>}</td><td className="px-5 py-4 text-right font-extrabold text-stone-700 text-lg align-middle">${order.price}</td><td className="px-5 py-4 text-right align-middle">{(appUser.isAdmin || appUser.name === order.userName) && (<button onClick={() => handleDeleteOrder(order.id)} className="text-stone-300 hover:text-rose-500 bg-white hover:bg-rose-50 p-2 rounded-full transition-colors"><X size={18} /></button>)}</td></tr>))}</tbody></table>)}</div></div>
              </div>
            )}

            {appUser && view === 'aggregate' && (
              <div className="space-y-8 animate-fade-in">
                <h2 className="text-2xl font-extrabold text-stone-800 border-l-4 border-emerald-400 pl-4 rounded-sm">打電話叫外送囉 📞</h2>
                {Object.keys(STORES).map(storeKey => {
                  const storeOrders = getAggregatedOrders(storeKey);
                  if (storeOrders.length === 0) return null;
                  const storeInfo = STORES[storeKey];
                  const theme = AGGREGATE_THEMES[storeKey];
                  return (
                    <div key={storeKey} className="space-y-4">
                      <div className={`${theme.bg} text-stone-800 p-6 rounded-[2rem] relative overflow-hidden shadow-sm`}><div className="relative z-10 flex justify-between items-start"><div><div className={`${theme.textLight} text-xs font-extrabold uppercase mb-2 tracking-widest`}>{theme.label}</div><div className="text-2xl font-extrabold mb-3">{storeInfo.name}</div><div className={`space-y-1.5 text-sm font-bold opacity-80`}><div className="flex items-center gap-2"><Phone size={16}/> {storeInfo.phone}</div><div className="flex items-center gap-2"><MapPin size={16}/> {storeInfo.address}</div></div></div><div className="text-right"><div className={`${theme.textLight} text-xs font-extrabold uppercase mb-2 tracking-widest`}>本店總計</div><div className="text-4xl font-black">${orders.filter(o => o.storeKey === storeKey).reduce((s, o) => s + o.price, 0)}</div></div></div></div>
                      <div className="bg-white rounded-[2rem] shadow-sm border-2 border-stone-100 overflow-hidden"><div className="overflow-x-auto no-scrollbar"><table className="w-full text-sm text-left"><thead className="text-stone-400 bg-stone-50/50 text-xs uppercase font-extrabold border-b-2 border-stone-100"><tr><th className="px-5 py-4 w-12 text-center"><CheckSquare size={16} className="mx-auto"/></th><th className="px-5 py-4 whitespace-nowrap">品項</th><th className="px-5 py-4 whitespace-nowrap">規格細節</th><th className="px-5 py-4 text-center whitespace-nowrap">數量</th><th className="px-5 py-4">訂購人</th></tr></thead><tbody className="divide-y-2 divide-stone-50">{storeOrders.map((group) => { const isChecked = !!aggChecklist[`${storeKey}_${group.id}`]; return (<tr key={group.id} className={`transition-colors ${isChecked ? theme.activeRow : 'hover:bg-stone-50'}`}><td className="px-5 py-4 text-center"><button onClick={() => setAggChecklist(prev => ({...prev, [`${storeKey}_${group.id}`]: !prev[`${storeKey}_${group.id}`]}))} className={`p-1.5 rounded-xl transition-all active:scale-90 ${isChecked ? theme.highlight : 'text-stone-300 hover:text-stone-400 bg-white border-2 border-stone-100'}`}>{isChecked ? <CheckSquare size={20} /> : <Square size={20} className="opacity-50" />}</button></td><td className={`px-5 py-4 font-extrabold text-base ${isChecked ? 'text-stone-400 line-through' : 'text-stone-700'}`}>{group.name}</td><td className={`px-5 py-4 ${isChecked ? 'opacity-50' : ''}`}><div className="flex flex-wrap gap-2 items-center mb-1"><span className="text-xs font-bold bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full">{group.size}</span><span className={`text-xs font-bold ${theme.highlight}`}>{group.sugar}</span><span className="text-stone-300 font-black">/</span><span className={`text-xs font-bold ${theme.highlight}`}>{group.ice}</span></div>{group.toppings && <div className="text-xs font-extrabold text-orange-500 mt-1.5 inline-block bg-orange-50 px-2 py-0.5 rounded-full">+ {group.toppings}</div>}</td><td className={`px-5 py-4 text-center font-black text-2xl ${isChecked ? 'text-stone-400' : theme.highlight}`}>{group.count}</td><td className="px-5 py-4 text-xs font-bold text-stone-400 leading-relaxed">{group.users.join(', ')}</td></tr>); })}</tbody></table></div></div>
                    </div>
                  );
                })}
                {orders.length === 0 && <div className="text-center py-16 text-stone-400 font-bold bg-white rounded-[2rem] border-2 border-dashed border-stone-200">目前尚無任何訂單 🍃</div>}
              </div>
            )}

            {appUser && appUser.isAdmin && view === 'admin' && (
              <div className="space-y-6 animate-fade-in">
                <div className="bg-white p-8 rounded-[2rem] border-2 border-stone-100 shadow-sm"><h3 className="font-extrabold text-stone-800 text-xl mb-3 flex items-center gap-2"><Settings size={24} className="text-stone-400" /> 系統管理 🛠️</h3><p className="text-sm font-bold text-stone-500 mb-2 leading-relaxed">這是一個獨立的點餐系統，菜單已由原始碼固定為「得正」、「龜祭」、「迷客夏」、「麻古茶坊」。</p></div>
                <div className="bg-rose-50 border-2 border-rose-200 p-8 rounded-[2rem]"><div className="flex justify-between items-center mb-6"><div><h3 className="font-black text-rose-700 text-xl flex items-center gap-2"><AlertTriangle size={24} /> 危險操作區</h3><p className="text-sm font-bold text-rose-500 mt-1">下列操作將永久刪除訂單資料，請謹慎使用唷！</p></div></div><div className="flex flex-col sm:flex-row gap-4"><button onClick={handleDeleteTodayOrders} disabled={loading} className="flex-1 bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-100 px-5 py-4 rounded-full text-sm font-extrabold transition-all shadow-sm flex items-center justify-center gap-2 active:scale-95"><Trash2 size={18} /> 清除今日訂單</button><button onClick={handleClearCurrentData} disabled={loading} className="flex-1 bg-rose-500 text-white hover:bg-rose-600 px-5 py-4 rounded-full text-sm font-extrabold transition-all shadow-md flex items-center justify-center gap-2 active:scale-95"><Trash2 size={18} /> 刪除所有歷史訂單</button></div></div>
              </div>
            )}
          </div>

          {modalOpen && pendingOrder && (
            <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-4 sm:p-0">
              <div className="absolute inset-0 bg-stone-900/40 backdrop-blur-sm transition-opacity" onClick={() => setModalOpen(false)}></div>
              <div className="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden animate-slide-up sm:animate-bounce-in max-h-[90vh] flex flex-col border-2 border-white"><div className={`p-8 shrink-0 bg-stone-800 text-white`}><h3 className="text-2xl font-extrabold mb-1">{pendingOrder.item.name}</h3><div className="flex justify-between items-end opacity-90"><span className="text-sm font-bold bg-white/20 px-3 py-1 rounded-full">{pendingOrder.size}</span><span className="text-4xl font-black">${calculateCurrentTotal()}</span></div></div><div className="p-6 space-y-6 overflow-y-auto no-scrollbar bg-[#FFFDF8]"><div className={`space-y-3 p-4 rounded-[1.5rem] transition-colors bg-white border-2 ${validationError === 'sugar' ? 'border-rose-300 bg-rose-50' : 'border-stone-100'}`}><label className="flex items-center gap-2 text-sm font-extrabold text-stone-700"><span className="bg-orange-100 p-1.5 rounded-full text-orange-500"><Settings size={14}/></span> 甜度 {sugarLocked && <span className="text-[10px] bg-stone-100 text-stone-500 px-2 py-1 rounded-full flex items-center gap-1">固定</span>}{!orderConfig.sugar && !sugarLocked && <span className="text-rose-500 text-[10px] ml-1 font-black animate-pulse">必填</span>}</label><div className="grid grid-cols-3 gap-2.5">{sugarLocked ? <button disabled className="py-3 text-xs font-bold rounded-2xl border-2 bg-stone-100 border-stone-200 text-stone-400 cursor-not-allowed col-span-3">糖度固定</button> : currentStore.sugar.map((opt, i) => (<button key={i} onClick={() => { setOrderConfig({...orderConfig, sugar: String(opt)}); if (validationError === 'sugar') setValidationError(null); }} className={`py-3 text-xs font-extrabold rounded-2xl border-2 transition-all active:scale-95 ${orderConfig.sugar === String(opt) ? 'bg-orange-100 border-orange-400 text-orange-800' : 'border-stone-100 text-stone-500 hover:bg-stone-50 hover:border-stone-200'}`}>{opt}</button>))}</div></div><div className={`space-y-3 p-4 rounded-[1.5rem] transition-colors bg-white border-2 ${validationError === 'ice' ? 'border-rose-300 bg-rose-50' : 'border-stone-100'}`}><label className="flex items-center gap-2 text-sm font-extrabold text-stone-700"><span className="bg-sky-100 p-1.5 rounded-full text-sky-500"><Settings size={14}/></span> 冰塊 {iceLocked && <span className="text-[10px] bg-stone-100 text-stone-500 px-2 py-1 rounded-full flex items-center gap-1">固定</span>}{!orderConfig.ice && !iceLocked && <span className="text-rose-500 text-[10px] ml-1 font-black animate-pulse">必填</span>}</label><div className="grid grid-cols-3 gap-2.5">{iceLocked ? <button disabled className="py-3 text-xs font-bold rounded-2xl border-2 bg-stone-100 border-stone-200 text-stone-400 cursor-not-allowed col-span-3">{orderConfig.ice}</button> : currentStore.ice.map((opt, i) => (<button key={i} onClick={() => { setOrderConfig({...orderConfig, ice: String(opt)}); if (validationError === 'ice') setValidationError(null); }} className={`py-3 text-xs font-extrabold rounded-2xl border-2 transition-all active:scale-95 ${orderConfig.ice === String(opt) ? 'bg-sky-100 border-sky-400 text-sky-800' : 'border-stone-100 text-stone-500 hover:bg-stone-50 hover:border-stone-200'}`}>{opt}</button>))}</div></div>{currentStore.toppings?.length > 0 && (<div className="space-y-3 p-4 rounded-[1.5rem] bg-white border-2 border-stone-100"><label className="flex items-center gap-2 text-sm font-extrabold text-stone-700"><span className="bg-amber-100 p-1.5 rounded-full text-amber-500"><Layers size={14}/></span> 加料 (可複選)</label><div className="grid grid-cols-2 gap-2.5">{currentStore.toppings.map((opt, i) => { const isSel = orderConfig.toppings.find(t => t.name === opt.name); return (<button key={i} onClick={() => toggleTopping(opt)} className={`py-3 px-4 text-xs font-extrabold rounded-2xl border-2 transition-all active:scale-95 flex justify-between items-center ${isSel ? 'bg-amber-100 border-amber-400 text-amber-800' : 'border-stone-100 text-stone-500 hover:bg-stone-50 hover:border-stone-200'}`}><span className="flex items-center gap-1.5">{isSel && <Check size={14} className="text-amber-600"/>}{opt.name}</span><span className={`${isSel ? 'bg-amber-200 text-amber-800' : 'bg-stone-100 text-stone-400'} px-2 py-0.5 rounded-full text-[10px]`}>+${opt.price}</span></button>); })}</div></div>)}</div><div className="p-5 border-t-2 border-stone-100 bg-white flex gap-3 shrink-0"><button onClick={() => setModalOpen(false)} className="flex-1 py-4 bg-stone-100 text-stone-500 hover:bg-stone-200 hover:text-stone-600 rounded-[1.5rem] font-extrabold transition-colors text-sm active:scale-95">取消</button><button onClick={confirmOrder} className="flex-[2] py-4 bg-stone-800 hover:bg-stone-700 text-white rounded-[1.5rem] font-extrabold shadow-lg shadow-stone-800/20 transition-all flex items-center justify-center gap-2 text-sm active:scale-95"><Check size={18} /> 確認送出</button></div></div>
            </div>
          )}

          {confirmDialog && (<div className="fixed inset-0 z-[70] flex items-center justify-center p-4"><div className="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onClick={closeConfirm}></div><div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-xs relative z-10 overflow-hidden animate-bounce-in p-8 text-center border-2 border-white"><div className="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4 text-rose-500"><AlertTriangle size={32}/></div><h3 className="text-xl font-extrabold text-stone-800 mb-2">{confirmDialog.title}</h3><p className="text-stone-500 font-bold text-sm mb-8 leading-relaxed">{confirmDialog.message}</p><div className="flex gap-3"><button onClick={closeConfirm} className="flex-1 py-3.5 bg-stone-100 text-stone-500 hover:bg-stone-200 rounded-full font-extrabold text-sm transition-colors active:scale-95">再想想</button><button onClick={confirmDialog.onConfirm} className="flex-1 py-3.5 bg-rose-500 hover:bg-rose-600 text-white rounded-full font-extrabold text-sm shadow-lg shadow-rose-500/30 transition-all active:scale-95">確認</button></div></div></div>)}
          {notification && (<div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 px-6 py-4 rounded-full shadow-xl shadow-stone-800/10 text-white text-sm font-extrabold animate-slide-up z-[100] flex items-center gap-2.5 ${notification.type === 'error' ? 'bg-rose-500' : 'bg-stone-800'}`}>{notification.type === 'error' ? <AlertTriangle size={18}/> : <Check size={18}/>}{notification.msg}</div>)}
          {loading && (<div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-40 flex items-center justify-center"><div className="w-14 h-14 border-4 border-orange-100 border-t-orange-400 rounded-full animate-spin"></div></div>)}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
